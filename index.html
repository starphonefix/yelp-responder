        extend: {
          colors: {
            star: {

              100: '#d9ebff',

              700: '#1e40af',

          },
          fontFamily: {
            sans: ['Segoe UI', 'system-ui', 'sans-serif'],

  <style>
    html {
      -webkit-text-size-adjust: 100%;
      height: 100%;
    }
    body {
      min-height: 100%;
      min-height: 100dvh;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .catalog-scroll::-webkit-scrollbar,
    .canvas-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .catalog-scroll::-webkit-scrollbar-thumb,
    .canvas-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 9999px;
    }
    .block-enter {
      animation: blockEnter 0.22s ease-out;
    }
    @keyframes blockEnter {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .inline-field {
      display: inline-block;
      vertical-align: baseline;
      min-width: 3ch;
      max-width: 100%;
      border: none;
      border-bottom: 2px solid #ef4444;
      background: #fef2f2;
      padding: 0 0.25rem;
      margin: 0 0.125rem;
      font: inherit;
      font-size: max(16px, 1em);
      line-height: inherit;
      color: #991b1b;
      outline: none;
      border-radius: 2px 2px 0 0;
      touch-action: manipulation;
    }
    .inline-field::placeholder {
      color: #fca5a5;
      opacity: 0.9;
    }
    .inline-field:focus {
      background: #fee2e2;
      border-bottom-color: #dc2626;
      box-shadow: 0 1px 0 0 #dc2626;
    }
    .inline-field--name {
      border-bottom-color: #2563eb;
      background: #eff6ff;
      color: #1e40af;
    }
    .inline-field--name::placeholder {
      color: #93c5fd;
    }
    .inline-field--name:focus {
      background: #dbeafe;
      border-bottom-color: #1d4ed8;
      box-shadow: 0 1px 0 0 #1d4ed8;
    }
    .block-editor {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .app-shell {
      min-height: 100dvh;
    }
    .app-header {
      padding-top: max(0px, env(safe-area-inset-top));
    }
    .touch-target {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .picker-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      width: 100%;
      text-align: left;
    }
    .picker-trigger-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .picker-trigger.is-placeholder .picker-trigger-label {
      color: #94a3b8;
    }
    .picker-sheet {
      visibility: hidden;
      pointer-events: none;
    }
    .picker-sheet.is-open {
      visibility: visible;
      pointer-events: auto;
    }
    .picker-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
    }
    .picker-panel {
      position: absolute;
      inset-inline: 0;
      bottom: 0;
      max-height: min(88dvh, 720px);
      display: flex;
      flex-direction: column;
      border-top-left-radius: 1rem;
      border-top-right-radius: 1rem;
      background: #fff;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.24s ease-out;
    }
    .picker-sheet.is-open .picker-panel {
      transform: translateY(0);
    }
    .picker-option {
      display: block;
      width: 100%;
      border-bottom: 1px solid #f1f5f9;
      padding: 0.95rem max(1rem, env(safe-area-inset-right)) 0.95rem max(1rem, env(safe-area-inset-left));
      text-align: left;
      font-size: 1rem;
      line-height: 1.35;
      color: #0f172a;
    }
    .picker-option.is-active {
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }
    @media (max-width: 767px) {
      .panel-canvas {
        min-height: 0;
      }
      .app-header-inner,
      .app-main {
        padding-left: max(0.5rem, env(safe-area-inset-left));
        padding-right: max(0.5rem, env(safe-area-inset-right));
      }
    }
    @media (min-width: 768px) {
      .app-main {
        max-width: 40rem;
        margin-inline: auto;
      }
    }
    .install-banner {
      display: none;
    }
    .install-banner.is-visible {
      display: block;
    }
    .install-banner-inner {
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
    }
  </style>
</head>
<body class="app-shell flex flex-col bg-slate-100 text-slate-900 font-sans antialiased">

        </div>
      </div>
      <div class="flex shrink-0 items-center gap-1.5 sm:gap-3">
        <div class="flex rounded-lg border border-slate-200 bg-slate-50 p-0.5" role="group" aria-label="Language">
          <button type="button" id="lang-en" class="lang-btn touch-target rounded-md px-2.5 py-2 text-sm font-medium transition sm:px-3 sm:py-1.5" data-lang="en">EN</button>
          <button type="button" id="lang-es" class="lang-btn touch-target rounded-md px-2.5 py-2 text-sm font-medium transition sm:px-3 sm:py-1.5" data-lang="es">ES</button>
        </div>
        <button

          id="clear-all-btn"
          class="touch-target rounded-lg border border-red-200 bg-red-50 px-2.5 py-2 text-xs font-medium text-red-700 transition hover:bg-red-100 sm:px-3 sm:text-sm"
          data-i18n="clearAll"
        >
          Clear All
        </button>
      </div>
    </div>
  </header>

  <!-- Install prompt (mobile PWA) -->

    </div>
  </div>

  <main class="app-main flex w-full max-w-none flex-1 flex-col gap-2 p-1 min-h-0 sm:gap-3 sm:p-4">

    <!-- Step pickers -->
    <div class="shrink-0 space-y-2 rounded-xl border border-slate-200 bg-white p-2 shadow-sm sm:space-y-3 sm:rounded-2xl sm:p-3">
      <div>

        </button>
      </div>
      <div>
        <label class="mb-1 block text-[11px] font-bold uppercase tracking-wide text-slate-500" data-i18n="step2Label">Step 2</label>
        <button type="button" id="step2-trigger" class="picker-trigger touch-target is-placeholder w-full rounded-xl border border-slate-300 bg-white px-3 py-3.5 text-base text-slate-800 outline-none transition focus:border-star-500 focus:ring-2 focus:ring-star-100">

        </button>
      </div>
    </div>

    <!-- Full-width picker sheet -->
    <div id="picker-sheet" class="picker-sheet fixed inset-0 z-50" aria-hidden="true">
      <div id="picker-backdrop" class="picker-backdrop"></div>
      <div class="picker-panel shadow-2xl" role="dialog" aria-modal="true">
        <div class="flex shrink-0 items-center justify-between border-b border-slate-100 px-4 py-3">
          <h3 id="picker-title" class="text-base font-semibold text-slate-800">Step 1</h3>
          <button type="button" id="picker-close" class="touch-target rounded-lg px-3 py-1.5 text-sm font-medium text-slate-500">✕</button>
        </div>
        <div id="picker-list" class="min-h-0 flex-1 overflow-y-auto overscroll-contain"></div>
      </div>
    </div>

    <!-- Message editor -->
    <section class="panel-canvas flex min-h-0 flex-1 flex-col overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm sm:rounded-2xl">
      <div class="shrink-0 border-b border-slate-100 px-3 py-2 sm:px-4">
        <h2 class="text-xs font-semibold uppercase tracking-wide text-slate-500" data-i18n="canvasTitle">Reply</h2>

        <div id="canvas-empty" class="flex min-h-[120px] flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 px-3 py-6 text-center">

        >

        </button>
        <p id="copy-feedback" class="mt-2 hidden text-center text-sm font-medium text-emerald-600" data-i18n="copied">Copied to clipboard!</p>
      </div>
    </section>
  </main>

      openToday: {

    const CATALOG = [
      {
        category: 'noModel',
        items: [
          'iphoneScreenNoModel',
          'samsungScreenNoModel',
          'motorolaScreenNoModel',
          'unknownIssue',
          'iphoneBatteryNoModel',
          'samsungBatteryNoModel',
          'iphoneChargingPortNoModel',
          'samsungChargingPortNoModel',
          'iphoneBackGlassNoModel',
        ],
      },
      {
        category: 'withModel',
        items: [
          'iphoneScreen1Quality',
          'iphoneScreen2Quality',
          'samsungScreen1Quality',
          'samsungScreen2Quality',
          'motorolaScreen1Quality',
          'iphoneBattery1Quality',
          'samsungBattery1Quality',
          'iphoneChargingPort1Quality',
          'samsungChargingPort1Quality',
        ],
      },
      {
        category: 'otherIssues',
        items: [
          'iphoneBackGlassLaser',
          'iphoneBackGlassFast',
          'ipadAskModel',
          'ipadGlassVsLcd',
          'waterDamageNoModel',
          'waterDamageWithModel',
        ],
      },
      {
        category: 'step2Logistics',
        divider: true,
        items: [
          'openToday',
          'closingSoon',
          'longRepair',
          'closedTonight',
          'closedWeekend',
        ],
      },
    ];

    const STEP1_CATALOG = CATALOG.filter((g) => g.category !== 'step2Logistics');
    const STEP2_CATALOG = CATALOG.find((g) => g.category === 'step2Logistics');

    /* ─── Global token defaults (fallback) ─── */
    const GLOBAL_DEFAULTS = {
      name: '',
      device: 'phone',
      model: '',
      price: '',
      price1: '',
      price2: '',
    };

    const TOKEN_REGEX = /\{\{(\w+)\}\}/g;

    function parseTemplate(text, defaults) {
      const segments = [];
      const slots = [];
      const slotValues = {};
      const tokenCounts = {};
      let lastIndex = 0;
      let match;
      const re = new RegExp(TOKEN_REGEX.source, 'g');

      while ((match = re.exec(text)) !== null) {
        if (match.index > lastIndex) {
          segments.push({ type: 'text', value: text.slice(lastIndex, match.index) });
        }

        const token = match[1];
        const count = tokenCounts[token] || 0;
        tokenCounts[token] = count + 1;
        const slotId = count === 0 ? token : token + '_' + count;

        slots.push({ id: slotId, token });
        slotValues[slotId] = defaults[token] ?? '';
        segments.push({ type: 'slot', id: slotId, token });
        lastIndex = re.lastIndex;
      }

      if (lastIndex < text.length) {
        segments.push({ type: 'text', value: text.slice(lastIndex) });
      }

      return { segments, slots, slotValues };
    }

    function formatSlotValue(token, value) {
      const trimmed = (value ?? '').trim();
      if (!trimmed) {
        return token === 'name' ? '' : '';
      }
      if (token === 'name') return ' ' + trimmed;
      return trimmed;
    }

    function getBlockText(block) {
      return block.segments
        .map((seg) => {
          if (seg.type === 'text') return seg.value;
          return formatSlotValue(seg.token, block.slotValues[seg.id]);
        })
        .join('');
    }

    function resizeInlineField(input) {
      const length = Math.max(input.value.length, input.placeholder.length, 3);
      input.style.width = length + 1 + 'ch';
    }

    /* ─── State ─── */
    let currentLang = localStorage.getItem('spf-lang') || 'es';
    let step1Value = '';
    let step2Value = '';
    let activePicker = null;
    const blocks = [];
    const slotCache = {};

    /* ─── DOM refs ─── */
    const step1Trigger = document.getElementById('step1-trigger');
    const step2Trigger = document.getElementById('step2-trigger');
    const step1LabelEl = document.getElementById('step1-label');
    const step2LabelEl = document.getElementById('step2-label');
    const pickerSheet = document.getElementById('picker-sheet');
    const pickerBackdrop = document.getElementById('picker-backdrop');
    const pickerClose = document.getElementById('picker-close');
    const pickerTitle = document.getElementById('picker-title');
    const pickerList = document.getElementById('picker-list');
    const canvasEl = document.getElementById('canvas');
    const canvasEmptyEl = document.getElementById('canvas-empty');
    const copyBtn = document.getElementById('copy-btn');
    const copyFeedback = document.getElementById('copy-feedback');
    const clearAllBtn = document.getElementById('clear-all-btn');
    const installBanner = document.getElementById('install-banner');
    const installTitle = document.getElementById('install-title');
    const installMessage = document.getElementById('install-message');
    const installBtn = document.getElementById('install-btn');
    const installDismiss = document.getElementById('install-dismiss');

    let deferredInstallPrompt = null;

    function isStandaloneApp() {
      return (
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true
      );
    }

    function isMobileDevice() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;
    }

    function isIosSafari() {
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/i.test(ua);
      const isSafari = /Safari/i.test(ua) && !/CriOS|FxiOS|EdgiOS/i.test(ua);
      return isIOS && isSafari;
    }

    function hideInstallBanner() {
      installBanner.classList.remove('is-visible');
    }

    function showInstallBanner(mode) {
      if (isStandaloneApp()) return;
      if (localStorage.getItem('spf-install-dismissed') === '1') return;
      if (!isMobileDevice()) return;

      installTitle.textContent = t('installTitle');
      installMessage.textContent = mode === 'ios' ? t('installIos') : t('installAndroid');
      installBtn.classList.toggle('hidden', mode !== 'android');
      installBanner.classList.add('is-visible');
    }

    function initInstallPrompt() {
      if (isStandaloneApp()) return;

      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        showInstallBanner('android');
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        hideInstallBanner();
      });

      installDismiss.addEventListener('click', () => {
        localStorage.setItem('spf-install-dismissed', '1');
        hideInstallBanner();
      });

      window.setTimeout(() => {
        if (!deferredInstallPrompt && isIosSafari()) {
          showInstallBanner('ios');
        }
      }, 1200);
    }

    function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    function t(key) {
      const keys = key.split('.');
      let val = UI[currentLang];
      for (const k of keys) val = val?.[k];
      return val ?? key;
    }

    function findTemplateById(templateId) {
      const msg = MESSAGES[templateId];
      if (!msg) return null;
      return { id: templateId, text: msg.text, defaults: msg.defaults };
    }

    function resolveCatalogItem(item) {
      if (typeof item === 'string') return findTemplateById(item);
      return item;
    }

    function buildBlockFromTemplate(templateItem, preservedValues) {
      const defaults = getDefaults(templateItem.defaults || {});
      const parsed = parseTemplate(templateItem.text, defaults);

      if (preservedValues) {
        parsed.slots.forEach((slot, index) => {
          if (preservedValues[index] != null) {
            parsed.slotValues[slot.id] = preservedValues[index];
          }
        });
      }

      return {
        segments: parsed.segments,
        slots: parsed.slots,
        slotValues: parsed.slotValues,
      };
    }

    function getDefaults(templateDefaults) {
      return { ...GLOBAL_DEFAULTS, ...templateDefaults };
    }

    function updateEmptyState() {
      const hasBlocks = blocks.length > 0;
      canvasEmptyEl.classList.toggle('hidden', hasBlocks);
      copyBtn.disabled = !hasBlocks;
    }

    function updatePickerTriggers() {
      const setTrigger = (trigger, labelEl, value, placeholderKey) => {
        if (value) {
          labelEl.textContent = t('templates.' + value);
          trigger.classList.remove('is-placeholder');
        } else {
          labelEl.textContent = t(placeholderKey);
          trigger.classList.add('is-placeholder');
        }
      };
      setTrigger(step1Trigger, step1LabelEl, step1Value, 'step1Placeholder');
      setTrigger(step2Trigger, step2LabelEl, step2Value, 'step2Placeholder');
    }

    function openPicker(which) {
      activePicker = which;
      pickerTitle.textContent = t(which === 'step1' ? 'step1Label' : 'step2Label');
      pickerList.innerHTML = '';

      const groups = which === 'step1' ? STEP1_CATALOG : [STEP2_CATALOG];
      const currentValue = which === 'step1' ? step1Value : step2Value;

      groups.forEach((group) => {
        const heading = document.createElement('div');
        heading.className = 'sticky top-0 z-10 border-b border-slate-100 bg-slate-50 px-4 py-2 text-xs font-bold uppercase tracking-wide text-slate-500';
        heading.textContent = t('categories.' + group.category);
        pickerList.appendChild(heading);

        group.items.forEach((rawItem) => {
          const item = resolveCatalogItem(rawItem);
          if (!item) return;

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'picker-option touch-target' + (item.id === currentValue ? ' is-active' : '');
          btn.textContent = t('templates.' + item.id);
          btn.addEventListener('click', () => selectPickerItem(item.id));
          pickerList.appendChild(btn);
        });
      });

      pickerSheet.classList.add('is-open');
      pickerSheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closePicker() {
      pickerSheet.classList.remove('is-open');
      pickerSheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      activePicker = null;
    }

    function selectPickerItem(templateId) {
      cacheAllBlocks();
      if (activePicker === 'step1') {
        step1Value = templateId;
      } else if (activePicker === 'step2') {
        step2Value = templateId;
      }
      closePicker();
      updatePickerTriggers();
      rebuildCanvas();
    }

    function rebuildCanvas() {
      canvasEl.querySelectorAll('article[data-block-id]').forEach((el) => el.remove());
      blocks.splice(0, blocks.length);

      if (step1Value) {
        const tpl = findTemplateById(step1Value);
        if (tpl) appendBlock(tpl, 'step1');
      }

      if (step2Value) {
        const tpl = findTemplateById(step2Value);
        if (tpl) appendBlock(tpl, 'step2');
      }

      canvasEl.classList.toggle('space-y-2', blocks.length > 0);
      updateEmptyState();
    }

    function appendBlock(templateItem, role) {
      const preserved = slotCache[templateItem.id] || null;
      const built = buildBlockFromTemplate(templateItem, preserved);

      const block = {
        role,
        templateId: templateItem.id,
        segments: built.segments,
        slots: built.slots,
        slotValues: built.slotValues,
        el: null,
        editorEl: null,
      };

      const card = createBlockElement(block);
      block.el = card;
      blocks.push(block);
      canvasEl.appendChild(card);
    }

    function createBlockElement(block) {
      const card = document.createElement('article');
      card.className = 'block-enter rounded-xl border border-slate-200 bg-slate-50 p-3 shadow-sm sm:p-4';
      card.dataset.blockId = block.role;

      const partLabel = document.createElement('p');
      partLabel.className = 'mb-2 text-[10px] font-bold uppercase tracking-wider text-star-600';
      partLabel.textContent = t(block.role === 'step1' ? 'step1Part' : 'step2Part');
      card.appendChild(partLabel);

      const editor = document.createElement('div');
      editor.className =
        'block-editor rounded-lg border border-slate-200 bg-white px-2.5 py-2.5 text-[15px] leading-relaxed text-slate-800 sm:px-3 sm:py-3 sm:text-sm';

      block.segments.forEach((seg) => {
        if (seg.type === 'text') {
          editor.appendChild(document.createTextNode(seg.value));
          return;
        }

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'inline-field' + (seg.token === 'name' ? ' inline-field--name' : '');
        input.value = block.slotValues[seg.id] ?? '';
        input.placeholder = t('tokenLabels.' + seg.token) || seg.token;
        input.setAttribute('aria-label', t('tokenLabels.' + seg.token) || seg.token);
        input.dataset.slotId = seg.id;
        resizeInlineField(input);

        input.addEventListener('input', (e) => {
          block.slotValues[seg.id] = e.target.value;
          resizeInlineField(e.target);
        });

        editor.appendChild(input);
      });

      card.appendChild(editor);
      block.editorEl = editor;
      return card;
    }

    function clearAllBlocks() {
      step1Value = '';
      step2Value = '';
      Object.keys(slotCache).forEach((k) => delete slotCache[k]);
      updatePickerTriggers();
      rebuildCanvas();
      copyFeedback.classList.add('hidden');
    }

    function cacheAllBlocks() {
      blocks.forEach((block) => {
        slotCache[block.templateId] = block.slots.map((slot) => block.slotValues[slot.id]);
      });
    }

    function getFinalText() {
      return blocks
        .map((b) => getBlockText(b))
        .filter((text) => text.trim())
        .join('\n\n');
    }

    async function copyFinalText() {
      const text = getFinalText();
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      copyFeedback.classList.remove('hidden');
      clearTimeout(copyFinalText._timer);
      copyFinalText._timer = setTimeout(() => {
        copyFeedback.classList.add('hidden');
      }, 2000);
    }

    function applyLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('spf-lang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key) el.textContent = t(key);
      });

      document.querySelectorAll('.lang-btn').forEach((btn) => {
        const active = btn.dataset.lang === lang;
        btn.classList.toggle('bg-white', active);
        btn.classList.toggle('text-star-700', active);
        btn.classList.toggle('shadow-sm', active);
        btn.classList.toggle('text-slate-500', !active);
      });

      updatePickerTriggers();

      if (installBanner.classList.contains('is-visible')) {
        const mode = installBtn.classList.contains('hidden') ? 'ios' : 'android';
        installTitle.textContent = t('installTitle');
        installMessage.textContent = mode === 'ios' ? t('installIos') : t('installAndroid');
      }

      blocks.forEach((block) => {
        const newCard = createBlockElement(block);
        block.el.replaceWith(newCard);
        block.el = newCard;
      });
    }

    /* ─── Event listeners ─── */
    document.getElementById('lang-en').addEventListener('click', () => applyLanguage('en'));
    document.getElementById('lang-es').addEventListener('click', () => applyLanguage('es'));
    step1Trigger.addEventListener('click', () => openPicker('step1'));
    step2Trigger.addEventListener('click', () => openPicker('step2'));
    pickerBackdrop.addEventListener('click', closePicker);
    pickerClose.addEventListener('click', closePicker);
    clearAllBtn.addEventListener('click', clearAllBlocks);
    copyBtn.addEventListener('click', copyFinalText);

    /* ─── Init ─── */
    updatePickerTriggers();
    applyLanguage(currentLang);
    initInstallPrompt();
    registerServiceWorker();
  </script>
